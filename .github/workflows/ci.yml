name: CI

on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build y tests
        run: mvn verify -Dnet.bytebuddy.experimental=true
        env:
          GROQ_API_KEY: dummy-not-needed-in-tests
          GTD_VAULT_PATH: /tmp/vault
