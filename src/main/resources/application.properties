spring.application.name=java-gtd
spring.threads.virtual.enabled=true
spring.web.resources.add-mappings=false

# Groq via OpenAI-compatible endpoint
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.stream=false
spring.ai.retry.max-attempts=1

# Obsidian vault path — set GTD_VAULT_PATH env var, or override in application-local.properties (gitignored)
gtd.vault.path=${GTD_VAULT_PATH:/path/to/your/obsidian/vault}

spring.ai.openai.audio.transcription.options.model=whisper-large-v3

# Local overrides (gitignored — create src/main/resources/application-local.properties)
spring.config.import=optional:classpath:application-local.properties
