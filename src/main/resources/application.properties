spring.application.name=java-gtd
spring.threads.virtual.enabled=true
spring.web.resources.add-mappings=false

# Persistent log file (in addition to console) — rotated by Spring Boot's default logback policy
logging.file.name=logs/gtd.log

# Startup self-healing migrations on the vault — default on, can be disabled individually
gtd.vault.migrate-today-since=true
gtd.vault.migrate-timestamps=true
gtd.vault.migrate-bucket-mismatch=true
gtd.vault.migrate-delegado-list=true

# LlmConfig builds its own qualified ChatClient beans (groq/ollama) — the default
# autoconfigured (unqualified) ChatClient.Builder is ambiguous once 2 ChatModels
# are on the classpath, so it's excluded.
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.chat.client.ChatClientAutoConfiguration

# Groq via OpenAI-compatible endpoint
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.stream=false
spring.ai.retry.max-attempts=2
spring.ai.retry.backoff.initial-interval=2000
spring.ai.retry.backoff.multiplier=2

# Obsidian vault path — set GTD_VAULT_PATH env var, or override in application-local.properties (gitignored)
gtd.vault.path=${GTD_VAULT_PATH:/path/to/your/obsidian/vault}

# "sample" (default, public) uses the English prompts/classifier.st + classifier-fallback.st.
# "custom" uses the gitignored, Argentinized prompts/classifier_custom.st + classifier-fallback-custom.st —
# local-only, set via CLASSIFIER_TEMPLATE env var or application-local.properties (gitignored).
classifier.template=${CLASSIFIER_TEMPLATE:sample}

spring.ai.openai.audio.transcription.options.model=whisper-large-v3

# Local overrides (gitignored — create src/main/resources/application-local.properties)
spring.config.import=optional:classpath:application-local.properties
